    <script>
// ============================================================================

const HS_CONTENT_URL = 'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/hs-content';
const HS_CONTENT_URL_2 = 'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/hs-content-2';

// ============================================================================
const HS_TRACKER_URL = 'https://clhuplhaejneecbyhphh.supabase.co/functions/v1/hs-session-tracker';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsaHVwbGhhZWpuZWVjYnlocGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA2Mzc5OTksImV4cCI6MjA3NjIxMzk5OX0.ropRR6Izmcy1sRV5v9HDDvBTlCTTGnJcLUvdSyYloBI';

let _sessionId = null;

async function initSession(email) {
    try {
        const res = await fetch(HS_TRACKER_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${SUPABASE_ANON}`
            },
            body: JSON.stringify({ action: 'init', email })
        });
        if (res.ok) {
            const data = await res.json();
            _sessionId = data.session_id || null;
        }
    } catch (e) {
        console.warn('Session init failed:', e);
    }
}

async function trackAppend(col, val) {
    if (!_sessionId) return;
    try {
        await fetch(HS_TRACKER_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${SUPABASE_ANON}`
            },
            body: JSON.stringify({ action: 'append', session_id: _sessionId, col, val })
        });
    } catch (e) {
        console.warn('trackAppend failed:', e);

}

    try {

            method: 'POST',
            headers: {
                'Content-Type': 'application/json',

}
const AUTH_HEADER = { 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsaHVwbGhhZWpuZWVjYnlocGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA2Mzc5OTksImV4cCI6MjA3NjIxMzk5OX0.ropRR6Izmcy1sRV5v9HDDvBTlCTTGnJcLUvdSyYloBI' };

async function loadContent() {
  // Fetch both edge functions in parallel to get all major_items
  // hs-content returns major_id <= 60, hs-content-2 returns major_id > 60
  // This bypasses the 1000 row cap on major_items
  const [res1, res2] = await Promise.all([
    fetch(HS_CONTENT_URL, { headers: AUTH_HEADER }),
    fetch(HS_CONTENT_URL_2, { headers: AUTH_HEADER }),
  ]);
  if (!res1.ok) throw new Error('Failed to load content: ' + res1.status);
  if (!res2.ok) throw new Error('Failed to load content-2: ' + res2.status);
  const [data1, data2] = await Promise.all([res1.json(), res2.json()]);

  // Merge — all data comes from hs-content, extra majorItems from hs-content-2
  const data = {
    ...data1,
    majorItems: [...(data1.majorItems || []), ...(data2.majorItems || [])],
  };

  // Build clusters array with workOn and learningFeels from cluster_items
  clusters = (data.clusters || []).map(c => {
    const items = (data.clusterItems || []).filter(i => i.cluster_id === c.id);
    return {
      id: c.id,
      title: c.title,
      about: c.about,
      enjoy: c.enjoy,
      color: c.color,
      majors: (data.majors || []).filter(m => m.cluster_id === c.id).map(m => m.title),
      workOn: items.filter(i => i.type === 'work_on').sort((a,b) => a.display_order - b.display_order).map(i => i.content),
      learningFeels: items.filter(i => i.type === 'learning_feel').sort((a,b) => a.display_order - b.display_order).map(i => i.content),
    };
  });

  // Build majorCatalog object keyed by title
  majorCatalog = {};
  (data.majors || []).forEach(m => {
    const items = (data.majorItems || []).filter(i => i.major_id === m.id);
    const getItems = (type) => items.filter(i => i.type === type).sort((a,b) => a.display_order - b.display_order).map(i => i.content);
    majorCatalog[m.title] = {
      title: m.title,
      whatItIs: m.what_it_is,
      whatYouStudy: getItems('what_you_study'),
      whatProjectsFeelLike: getItems('what_projects_feel'),
      goodToKnow: getItems('good_to_know'),
      careerExamples: getItems('career_example'),
      tryItInHS: getItems('try_it_in_hs'),
    };
  });

  // Build CAREER_ABSTRACTS object keyed by lookup_key
  CAREER_ABSTRACTS = {};
  (data.careers || []).forEach(c => {
    const sections = (data.careerSections || []).filter(s => s.career_id === c.id).sort((a,b) => a.display_order - b.display_order);
    CAREER_ABSTRACTS[c.lookup_key] = {
      title: c.title,
      sections: sections.map(s => {
        const sItems = (data.careerSectionItems || []).filter(i => i.section_id === s.id).sort((a,b) => a.display_order - b.display_order);
        const paragraphs = sItems.filter(i => i.item_type === 'paragraph');
        const bullets = sItems.filter(i => i.item_type === 'bullet');
        const obj = { h: s.heading };
        if (paragraphs.length > 0) obj.p = paragraphs[0].content;
        if (bullets.length > 0) obj.bullets = bullets.map(i => i.content);
        return obj;
      }),
    };
  });
}

// Resolve CIP code(s) for a given major + cluster
function resolveCip4(majorName, clusterId) {
  // 1) Exact match
  if (majorToCip4[majorName]) {
    const v = majorToCip4[majorName];
    return Array.isArray(v) ? v : [v];
  }

  // 2) Normalized match (protects against whitespace/case differences)
  const key = normalizeMajor(majorName);
  if (majorToCip4Normalized[key]) {
    const v = majorToCip4Normalized[key];
    return Array.isArray(v) ? v : [v];
  }

  // 3) Fallback: broad cluster-level coverage
  return clusterToCip4Fallback[clusterId] || [];
}

function applyPass2Nuance(domainId, pass2, clusterSet) {
    const style = pass2?.style;
    const motivations = pass2?.motivations || [];
    const hasMot = (frag) => motivations.some((m) => (m || "").toLowerCase().includes(frag));

    // Build & Make
    if (domainId === "build_make") {
        if (style === "plan") clusterSet.add("eng_tech");
        if (style === "hands") clusterSet.add("skilled");
        if (hasMot("tools") || hasMot("tech")) clusterSet.add("eng_tech");
    }

    // Fix / Hands-on
    if (domainId === "fix_hands") {
        if (style === "mix" || style === "shop") clusterSet.add("eng_tech");
        if (hasMot("help people") || hasMot("help others") || hasMot("helping people")) {
            clusterSet.add("health");
        }
    }

    // Analyze & Solve
    if (domainId === "analyze_solve") {
        if (style === "messy") {
            clusterSet.add("sci");
            clusterSet.add("social");
        }
        if (style === "rules") {
            clusterSet.add("cs_data");
            clusterSet.add("biz");
        }
        if (hasMot("efficient")) clusterSet.add("eng_tech");
    }

    // Create & Express
    if (domainId === "create_express") {
        if (style === "freedom") clusterSet.add("arts");
        if (style === "brief") clusterSet.add("comm");
        if (hasMot("story") || hasMot("telling")) clusterSet.add("comm");
    }

    // Perform & Entertain
    if (domainId === "perform_entertain") {
        if (style === "spotlight") clusterSet.add("comm");
        if (style === "group") clusterSet.add("arts");
    }

    // Help & Support
    if (domainId === "help_support") {
        if (style === "direct") clusterSet.add("health");
        if (style === "behind") clusterSet.add("social");
        if (hasMot("mission") || hasMot("difference")) clusterSet.add("civic");
    }

    // Teach & Coach
    if (domainId === "teach_coach") {
        if (style === "kids") clusterSet.add("edu");
        if (style === "peers") clusterSet.add("biz");
        if (style === "mix") {
            clusterSet.add("edu");
            clusterSet.add("health");
        }
    }

    // Lead & Sell
    if (domainId === "lead_sell") {
        if (style === "front") clusterSet.add("comm");
        if (style === "ops") clusterSet.add("biz");
        if (hasMot("new") || hasMot("build")) clusterSet.add("biz");
    }

    // Organize & Track
    if (domainId === "organize_track") {
        if (style === "clear") clusterSet.add("civic");
        if (style === "flex") clusterSet.add("biz");
        if (hasMot("reliable") || hasMot("run smoothly")) clusterSet.add("skilled");
    }

    // Compete & Train
    if (domainId === "compete_train") {
        if (style === "clear") clusterSet.add("edu");
        if (hasMot("routine") || hasMot("disciplin")) clusterSet.add("health");
    }

    // Outdoors & Animals
    if (domainId === "outdoors_animals") {
        if (style === "lab") clusterSet.add("sci");
        if (style === "field") clusterSet.add("env");
        if (hasMot("environment") || hasMot("nature")) clusterSet.add("civic");
    }

    // Explore & Research
    if (domainId === "explore_research") {
        if (style === "deep") clusterSet.add("sci");
        if (style === "wide") clusterSet.add("social");
        if (hasMot("evidence") || hasMot("prove")) clusterSet.add("sci");
    }

    // Design & Improve
    if (domainId === "design_better") {
        if (hasMot("simpler") || hasMot("easier")) clusterSet.add("cs_data");
        if (hasMot("creative")) clusterSet.add("comm");
        if (style === "team") clusterSet.add("comm");
        if (style === "solo") clusterSet.add("cs_data");
    }

    return clusterSet;
}

function computeClusterSurfacing({ pass1Answers, selectedDomains, pass2Answers }) {
    const selected = Array.from(selectedDomains || []);
    const meta = {};
    
    const ensure = (cid) => {
        if (!meta[cid]) meta[cid] = { supportCount: 0, reinforced: false, reasons: [] };
        return meta[cid];
    };

    const addReason = (cid, text) => {
        const m = ensure(cid);
        if (!m.reasons.includes(text)) m.reasons.push(text);
    };

    const surfaced = new Set();

    // A) Base mapping from selected domains → clusters
    for (const domainId of selected) {
        const baseClusters = domainBaseClusters[domainId] || [];
        const domainMeta = domains.find((d) => d.id === domainId);
        const score = pass1Answers?.[domainId];

        for (const cid of baseClusters) {
            surfaced.add(cid);
            const m = ensure(cid);
            m.supportCount += 1;

            const title = domainMeta?.title || domainId;
            const strength = score === 3 ? "strongly resonated" : score === 2 ? "somewhat resonated" : "";
            const strengthNote = strength ? " (it " + strength + " in the quick check-in)" : "";
            addReason(cid, `Because you chose to explore "${title}"${strengthNote}.`);

            if (score === 3) m.reinforced = true;
        }
    }

    // B) Pass 2 nuance mapping
    for (const domainId of selected) {
        const p2 = pass2Answers?.[domainId];
        if (!p2) continue;

        const before = new Set(surfaced);
        const afterRaw = applyPass2Nuance(domainId, p2, new Set(surfaced));
        const after = afterRaw instanceof Set ? afterRaw : new Set(afterRaw || []);

        for (const cid of after) {
            surfaced.add(cid);
            ensure(cid);
        }

        const domainTitle = domains.find((d) => d.id === domainId)?.title || domainId;

        for (const cid of after) {
            if (!before.has(cid)) {
                meta[cid].reinforced = true;

                if (p2?.style) {
                    const styleLabel = (pass2Modules?.[domainId]?.envStyle?.options || []).find(o => o.key === p2.style)?.label;
                    if (styleLabel) {
                        addReason(cid, `Your "${domainTitle}" answers leaned toward: ${styleLabel}.`);
                    }
                }

                const relevantMots = (p2.motivations || []).slice(0, 2);
                for (const mot of relevantMots) {
                    if (mot && mot !== "I'm not sure yet") {
                        addReason(cid, `You mentioned: "${mot}".`);
                    }
                }
            }
        }

        // Reflection reinforcement
        if (p2.reflect === "I want to explore this more.") {
            const baseCs = domainBaseClusters[domainId] || [];
            for (const cid of baseCs) {
                if (surfaced.has(cid)) {
                    meta[cid].reinforced = true;
                    addReason(cid, `You said you want to explore "${domainTitle}" more.`);
                }
            }
        }
    }

    // Sort surfaced by cluster order
    const surfacedArray = clusters.filter(c => surfaced.has(c.id)).map(c => c.id);

    return { surfaced: surfacedArray, meta };
}

function selectComparisons(surfacedClusters, lastClusterId) {
    const surfacedSet = new Set(surfacedClusters);
    const eligible = [];

    for (const [a, b] of canonicalComparisons) {
        if (surfacedSet.has(a) && surfacedSet.has(b)) {
            eligible.push({ a, b, trigger: "both" });
        }
    }

    if (eligible.length > 0) {
        return eligible.slice(0, 2);
    }

    // Confusion fallback
    if (lastClusterId) {
        const pair = canonicalComparisons.find(([a, b]) => a === lastClusterId || b === lastClusterId);
        if (pair) {
            const [a, b] = pair;
            return [{ a, b, trigger: "confusion" }];
        }
    }

    return [];
}

function openCareerDrawer(careerKey) {
    const career = CAREER_ABSTRACTS[careerKey];
    if (!career) {
        console.log('Career not found:', careerKey);
        return;
    }
    
    const overlay = document.getElementById('careerDrawerOverlay');
    const drawer = document.getElementById('careerDrawer');
    const title = document.getElementById('careerDrawerTitle');
    const content = document.getElementById('careerDrawerContent');
    
    title.textContent = career.title;
    
    let html = '';
    career.sections.forEach(section => {
        html += '<div class="career-section">';
        html += `<h3>${section.h}</h3>`;
        
        if (section.p) {
            html += `<p>${section.p}</p>`;
        }
        
        if (section.bullets) {
            html += '<ul class="bullet-list">';
            section.bullets.forEach(bullet => {
                html += `<li>${bullet}</li>`;
            });
            html += '</ul>';
        }
        
        html += '</div>';
    });
    
    content.innerHTML = html;
    
    // Show drawer with animation
    overlay.classList.add('active');
    setTimeout(() => {
        drawer.classList.add('active');
    }, 10);
}

function closeCareerDrawer() {
    const overlay = document.getElementById('careerDrawerOverlay');
    const drawer = document.getElementById('careerDrawer');
    
    drawer.classList.remove('active');
    setTimeout(() => {
        overlay.classList.remove('active');
    }, 300);
}

function makeCareerLinksClickable(text) {
    // Find career examples that match CAREER_ABSTRACTS keys and make them clickable
    // Sort keys longest-first to prevent partial matches on shorter keys
    const sortedKeys = Object.keys(CAREER_ABSTRACTS).sort((a, b) => b.length - a.length);
    let result = text;
    sortedKeys.forEach(careerKey => {
        const escaped = careerKey.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(escaped, 'gi');
        result = result.replace(regex, match => {
            return `<span class="career-link" onclick="openCareerDrawer('${careerKey}')">${match}</span>`;
        });
    });
    return result;
}

    p1Answers: {},
    p1Index: 0,
    selectedDomains: new Set(),
    p2Answers: {},
    p2Order: [],
    p2Index: 0,
    surfacedClusters: [],
    clusterMeta: {},
    activeCluster: null,
    activeMajor: null,
    comparePair: null,
    favorites: {
        clusters: new Map(),
        majors: new Map(),
        schools: new Map(),
    },
};

function saveState() {
    const toSave = {
        screen: state.screen,
        userEmail: state.userEmail,
        p1Answers: state.p1Answers,
        p1Index: state.p1Index,
        selectedDomains: Array.from(state.selectedDomains),
        p2Answers: state.p2Answers,
        p2Order: state.p2Order,
        p2Index: state.p2Index,
        surfacedClusters: state.surfacedClusters,
        clusterMeta: state.clusterMeta,
        activeCluster: state.activeCluster,
        activeMajor: state.activeMajor,
        comparePair: state.comparePair,
    };
    localStorage.setItem('hs_major_explorer_state_v0', JSON.stringify(toSave));
}

function loadState() {
    const saved = localStorage.getItem('hs_major_explorer_state_v0');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            state.screen = (parsed.userEmail && parsed.screen) ? parsed.screen : "email_gate";
            state.userEmail = parsed.userEmail || null;
            state.p1Answers = parsed.p1Answers || {};
            state.p1Index = parsed.p1Index || 0;
            state.selectedDomains = new Set(parsed.selectedDomains || []);
            state.p2Answers = parsed.p2Answers || {};
            state.p2Order = parsed.p2Order || [];
            state.p2Index = parsed.p2Index || 0;
            state.surfacedClusters = parsed.surfacedClusters || [];
            state.clusterMeta = parsed.clusterMeta || {};
            state.activeCluster = parsed.activeCluster || null;
            state.activeMajor = parsed.activeMajor || null;
            state.comparePair = parsed.comparePair || null;
        } catch (e) {
            console.error('Failed to load state:', e);
        }
    }
}

function saveFavorites() {
    const toSave = {
        clusters: Array.from(state.favorites.clusters.entries()),
        majors: Array.from(state.favorites.majors.entries()),
        schools: Array.from(state.favorites.schools.entries()),
    };
    localStorage.setItem('hs_major_explorer_favorites_v0', JSON.stringify(toSave));
}

function loadFavorites() {
    const saved = localStorage.getItem('hs_major_explorer_favorites_v0');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            state.favorites.clusters = new Map(parsed.clusters || []);
            state.favorites.majors = new Map(parsed.majors || []);
            state.favorites.schools = new Map(parsed.schools || []);
        } catch (e) {
            console.error('Failed to load favorites:', e);
        }
    }
}

function resetAll() {
    const email = state.userEmail; // preserve email across restart
    _sessionId = null; // drop reference to old session (row stays in DB)
    state.screen = "welcome";
    state.p1Answers = {};
    state.p1Index = 0;
    state.selectedDomains = new Set();
    state.p2Answers = {};
    state.p2Order = [];
    state.p2Index = 0;
    state.surfacedClusters = [];
    state.clusterMeta = {};
    state.activeCluster = null;
    state.activeMajor = null;
    state.comparePair = null;
    state.userEmail = email; // restore email after clearing state
    saveState();
    render();
    if (email) initSession(email); // open a fresh session row for the new attempt
}

// Alias for resetAll to maintain consistency
function restartAssessment() {
    resetAll();
}

function startPass1() {
    state.screen = "pass1";
    state.p1Index = 0;
    state.p1Answers = {};
    saveState();
    render();
}

function finishPass1() {
    state.screen = "pass1_results";
    saveState();
    render();
    trackUpdate('p1_completed', true);
}

function continueToPass2() {
    state.p2Order = Array.from(state.selectedDomains);
    state.p2Index = 0;
    state.p2Answers = {};
    state.screen = "pass2";
    saveState();
    render();
}

function finishPass2() {
    const result = computeClusterSurfacing({
        pass1Answers: state.p1Answers,
        selectedDomains: state.selectedDomains,
        pass2Answers: state.p2Answers,
    });
    state.surfacedClusters = result.surfaced;
    state.clusterMeta = result.meta;
    state.screen = "clusters";
    saveState();
    render();
    trackUpdate('completed', true);
}

function openExploreCluster(clusterId) {
    state.activeCluster = clusterId;
    state.screen = "explore_cluster";
    saveState();
    render();
    trackAppend('clusters_viewed', clusterId);
}

function openMajorDetail(majorName, clusterId) {
    state.activeMajor = { name: majorName, clusterId };

    render();

}

function openSchools(majorName, clusterId) {

}

function openComparison(a, b) {

function openComparisonPicker() {
    state.screen = "compare_picker";
    state.compareMode = 'home'; // home | pickA | pickB
    state.compareFirst = null;
    state.compareShowAll = false;
    saveState();
    render();
}

function renderComparisonPicker() {
    const surfacedSet = new Set(state.surfacedClusters);
    
    // Build suggested pairs (surfaced-first)
    const suggested = canonicalComparisons
        .map(([a, b]) => ({ a, b }))
        .filter(({ a, b }) => a && b)
        .sort((p1, p2) => {
            const s1 = (surfacedSet.has(p1.a) ? 1 : 0) + (surfacedSet.has(p1.b) ? 1 : 0);
            const s2 = (surfacedSet.has(p2.a) ? 1 : 0) + (surfacedSet.has(p2.b) ? 1 : 0);
            return s2 - s1;
        })
        .slice(0, 6);
    
    // Ordered clusters (surfaced first)
    const surfacedFirst = clusters.filter(c => surfacedSet.has(c.id));
    const rest = clusters.filter(c => !surfacedSet.has(c.id));
    const orderedClusters = [...surfacedFirst, ...rest];
    
    // List for picking
    const listForPick = state.compareShowAll ? orderedClusters : 
        (surfacedFirst.length ? surfacedFirst : orderedClusters);
    
    // HOME mode
    if (!state.compareMode || state.compareMode === 'home') {
        return `
            <div class="container">
                <div class="header">
                    <div></div>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-ghost" onclick="openSaved()">Saved</button>
                        <button class="btn btn-sm btn-ghost" onclick="resetAll()">Restart</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-content">
                        <div class="title-block">
                            <h1>Compare Areas</h1>
                            <p>See how different areas can feel — there's no "better," just different.</p>
                        </div>
                        
                        <h3 class="font-semibold mb-3 text-sm">Common comparisons students explore</h3>
                        <div class="mb-4">
                            ${suggested.length === 0 ? `
                                <p class="text-sm text-muted">No suggested comparisons yet.</p>
                            ` : suggested.map(p => {
                                const a = clusters.find(c => c.id === p.a);
                                const b = clusters.find(c => c.id === p.b);
                                if (!a || !b) return '';
                                const both = surfacedSet.has(p.a) && surfacedSet.has(p.b);
                                const hint = both ? "Both surfaced for you" : "Common comparison";
                                return `
                                    <button class="btn btn-outline btn-full mb-2 text-left" style="padding: 12px; display: flex; flex-direction: column; align-items: flex-start;" 
                                            onclick="openComparison('${p.a}', '${p.b}')">
                                        <div class="font-semibold text-sm">${a.title} vs ${b.title}</div>
                                        <div class="text-xs text-muted">${hint}</div>
                                    </button>
                                `;
                            }).join('')}
                        </div>
                        
                        <div class="separator"></div>
                        
                        <h3 class="font-semibold mb-2 text-sm">Compare two areas you're curious about</h3>
                        <p class="text-xs text-muted mb-3">You can compare any two areas. This is just for exploration.</p>
                        <button class="btn btn-secondary btn-full mb-3" onclick="state.compareMode='pickA'; state.compareFirst=null; state.compareShowAll=false; render();">
                            Choose your own comparison
                        </button>
                        
                        <button class="btn btn-ghost btn-full" onclick="state.screen='clusters'; render();">Back</button>
                    </div>
                </div>
            </div>
        `;
    }
    
    // PICK A mode
    if (state.compareMode === 'pickA') {
        return `
            <div class="container">
                <div class="header">
                    <div></div>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-ghost" onclick="resetAll()">Restart</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-content">
                        <div class="title-block">
                            <h1>Pick the first area</h1>
                            <p>Start with the one you're most curious about.</p>
                        </div>
                        
                        <h3 class="font-semibold mb-3 text-sm">Areas</h3>
                        <div class="mb-4">
                            ${listForPick.map(c => `
                                <button class="btn btn-outline btn-full mb-2 text-left" style="padding: 12px; display: flex; flex-direction: column; align-items: flex-start;" 
                                        onclick="state.compareFirst='${c.id}'; state.compareMode='pickB'; state.compareShowAll=false; render();">
                                    <div class="font-semibold text-sm">${c.title}</div>
                                    <div class="text-xs text-muted">${surfacedSet.has(c.id) ? 'Surfaced for you' : ''}</div>
                                </button>
                            `).join('')}
                        </div>
                        
                        <button class="btn btn-secondary btn-full mb-3" onclick="state.compareShowAll=!state.compareShowAll; render();">
                            ${state.compareShowAll ? 'Show surfaced areas' : 'See all areas'}
                        </button>
                        
                        <button class="btn btn-ghost btn-full" onclick="state.compareMode='home'; state.compareFirst=null; render();">Back</button>
                    </div>
                </div>
            </div>
        `;
    }
    
    // PICK B mode
    if (state.compareMode === 'pickB') {
        const filteredList = listForPick.filter(c => c.id !== state.compareFirst);
        const firstCluster = clusters.find(c => c.id === state.compareFirst);
        
        return `
            <div class="container">
                <div class="header">
                    <div></div>
                    <div class="header-actions">
                        <button class="btn btn-sm btn-ghost" onclick="resetAll()">Restart</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-content">
                        <div class="title-block">
                            <h1>Pick the second area</h1>
                            <p>Compare with: ${firstCluster?.title || ''}</p>
                        </div>
                        
                        <h3 class="font-semibold mb-3 text-sm">Areas</h3>
                        <div class="mb-4">
                            ${filteredList.map(c => `
                                <button class="btn btn-outline btn-full mb-2 text-left" style="padding: 12px; display: flex; flex-direction: column; align-items: flex-start;" 
                                        onclick="openComparison('${state.compareFirst}', '${c.id}')">
                                    <div class="font-semibold text-sm">${c.title}</div>
                                    <div class="text-xs text-muted">${surfacedSet.has(c.id) ? 'Surfaced for you' : ''}</div>
                                </button>
                            `).join('')}
                        </div>
                        
                        <button class="btn btn-secondary btn-full mb-3" onclick="state.compareShowAll=!state.compareShowAll; render();">
                            ${state.compareShowAll ? 'Show surfaced areas' : 'See all areas'}
                        </button>
                        
                        <button class="btn btn-ghost btn-full" onclick="state.compareMode='pickA'; render();">Back</button>
                    </div>
                </div>
            </div>
        `;
    }
}


function openSaved() {
    state.screen = "saved";
    saveState();
    render();

function render() {
    const app = document.getElementById('app');
    
    if (state.screen === "email_gate") {
        app.innerHTML = renderEmailGate();
    } else if (state.screen === "welcome") {
        app.innerHTML = renderWelcome();
    } else if (state.screen === "pass1") {
        app.innerHTML = renderPass1();
    } else if (state.screen === "pass1_results") {
        app.innerHTML = renderPass1Results();
    } else if (state.screen === "pass2") {
        app.innerHTML = renderPass2();
    } else if (state.screen === "clusters") {
        app.innerHTML = renderClusters();
    } else if (state.screen === "explore_cluster") {
        app.innerHTML = renderExploreCluster();
    } else if (state.screen === "major_detail") {
        app.innerHTML = renderMajorDetail();
    } else if (state.screen === "schools") {
        app.innerHTML = renderSchools();
    } else if (state.screen === "compare") {
        app.innerHTML = renderComparison();
    } else if (state.screen === "compare_picker") {
        app.innerHTML = renderComparisonPicker();
    } else if (state.screen === "saved") {
        app.innerHTML = renderSaved();
    }
    
    attachEventListeners();
}

function submitEmail() {
    const input = document.getElementById('email-input');
    const errorEl = document.getElementById('email-error');
    const email = (input?.value || '').trim().toLowerCase();
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if (!valid) {
        if (errorEl) errorEl.textContent = 'Please enter a valid email address.';
        return;
    }
    state.userEmail = email;
    state.screen = 'welcome';
    saveState();
    initSession(email); // fire-and-forget, non-blocking
    render();
}

function renderEmailGate() {
    return `
        <div class="container">
            <div class="title-block mb-4" style="margin-top:3rem;">
                <h1>Welcome to CloverPath</h1>
                <p>Enter your email to get started. We'll save your exploration results.</p>
            </div>
            <div class="card">
                <div class="card-content">
                    <label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;letter-spacing:0.04em;text-transform:uppercase;">Email Address</label>
                    <input
                        id="email-input"

                        style="width:100%;padding:12px 14px;font-size:15px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-primary);outline:none;box-sizing:border-box;margin-bottom:8px;font-family:inherit;"
                        onkeydown="if(event.key==='Enter') submitEmail();"
                        onfocus="this.style.borderColor='var(--primary)'"

                    />
                    <div id="email-error" style="color:#c0392b;font-size:13px;min-height:18px;margin-bottom:8px;"></div>
                    <button class="btn btn-primary btn-full" onclick="submitEmail()">Continue</button>

    `;

                            ${module.envStyle.options.map(opt => `
                                <div class="option ${answers.style === opt.key ? 'selected' : ''}" onclick="setPass2Style('${domainId}', '${opt.key}')">
                                    <input type="radio" name="style" value="${opt.key}" ${answers.style === opt.key ? 'checked' : ''}>
                                    <label>${opt.label}</label>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <p class="font-semibold mb-2">3) What might motivate you? (Choose up to 2)</p>
                        <div class="checkbox-group-compact">
                            ${module.motivations.map(mot => {
                                const safeMot = mot.replace(/'/g, '&apos;');
                                const selectedCount = (answers.motivations || []).length;
                                const isSelected = (answers.motivations || []).includes(mot);
                                const isDisabled = !isSelected && selectedCount >= 2;
                                return `
                                <div class="option ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}" data-motivation="${safeMot}" onclick="${isDisabled ? '' : `togglePass2Motivation('${domainId}', this.dataset.motivation)`}">
                                    <input type="checkbox" value="${mot}" ${isSelected ? 'checked' : ''} ${isDisabled ? 'disabled' : ''}>
                                    <label>${mot}</label>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <p class="font-semibold mb-2">4) What might be frustrating?</p>
                        <div class="radio-group-compact">
                            ${module.frustrations.map(frust => {
                                const safeFrust = frust.replace(/'/g, '&apos;');
                                return `
                                <div class="option ${answers.frustration === frust ? 'selected' : ''}" data-frustration="${safeFrust}" onclick="setPass2Frustration('${domainId}', this.dataset.frustration)">
                                    <input type="radio" name="frustration" value="${frust}" ${answers.frustration === frust ? 'checked' : ''}>
                                    <label>${frust}</label>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <p class="font-semibold mb-2">5) After thinking about this area:</p>
                        <div class="radio-group-compact">
                            ${['I want to explore this more.', 'I want to know more before deciding.', 'This might not be for me.'].map(opt => `
                                <div class="option ${answers.reflect === opt ? 'selected' : ''}" onclick="setPass2Reflect('${domainId}', '${opt}')">
                                    <input type="radio" name="reflect" value="${opt}" ${answers.reflect === opt ? 'checked' : ''}>
                                    <label>${opt}</label>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="nav-buttons">
                        <button class="btn btn-secondary" onclick="prevPass2()">Back</button>
                        <button class="btn btn-primary" onclick="nextPass2()" ${!answers.style || !answers.reflect ? 'disabled' : ''}>
                            ${state.p2Index === state.p2Order.length - 1 ? 'See Results' : 'Next'}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `;
}

    civic:    ['#7c3aed','#f5f3ff'],

}

  </svg></div>`;
  const back = backFn ? `<button class="rp-btn rp-btn-ghost rp-btn-sm" onclick="${backFn}">&#8592; Back</button>` : '';
  const saved = savedCount > 0
    ? `<button class="rp-btn-pill-saved" onclick="openSaved()">

// ============================================================================
// renderClusters — main results landing
// ============================================================================
function renderClusters() {
  ensureResultsStyles();
  const savedCount = state.favorites.clusters.size + state.favorites.majors.size + state.favorites.schools.size;
  const comparisons = selectComparisons(state.surfacedClusters, state.activeCluster);

  const group1 = [], group2 = [];
  state.surfacedClusters.forEach(cid => {
    const meta = state.clusterMeta[cid] || {};
    const sc = meta.supportCount || 0;
    const re = meta.reinforced || false;
    if ((sc >= 2 || (sc >= 1 && re)) && group1.length < 4) group1.push(cid);
    else group2.push(cid);
  });

  function clusterCard(cid, idx) {
    const c = clusters.find(x => x.id === cid);
    const meta = state.clusterMeta[cid] || {};
    const [accent, pale] = clusterAccent(cid);
    const isSaved = state.favorites.clusters.has(cid);
    const reasons = (meta.reasons || []).slice(0, 3);
    const reasonsId = `reasons-${cid}`;
    return `
      <div class="rp-cluster-card rp-animate rp-animate-d${Math.min(idx+1,5)}" style="--cluster-accent:${accent}">
        <div class="rp-cluster-card-header" style="background:${accent}">
          <div class="rp-cluster-title">${c.title}</div>
          <div class="rp-cluster-about">${c.about}</div>
        </div>
        <div class="rp-cluster-card-body">
          ${c.enjoy ? `<p style="font-size:13px;color:#64748b;line-height:1.5;margin-bottom:${reasons.length ? '12px' : '0'}">${c.enjoy}</p>` : ''}
          ${reasons.length ? `
          <button class="rp-reasons-toggle" onclick="(function(btn){var el=document.getElementById('${reasonsId}');var open=el.style.display!=='none';el.style.display=open?'none':'block';btn.querySelector('.rp-reasons-arrow').style.transform=open?'rotate(0deg)':'rotate(180deg)';})(this)" style="display:flex;align-items:center;gap:5px;background:none;border:none;padding:0;cursor:pointer;font-size:11px;font-weight:600;color:#94a3b8;letter-spacing:0.3px;text-transform:uppercase">
            <span>Why this appeared</span>
            <span class="rp-reasons-arrow" style="display:inline-block;transition:transform 0.2s;font-size:9px;">&#9660;</span>
          </button>
          <div id="${reasonsId}" style="display:none;margin-top:8px;">
            ${reasons.map(r=>`<div style="font-size:12px;color:#64748b;padding:4px 0;border-bottom:1px solid #f1f5f9;line-height:1.4">${r}</div>`).join('')}
          </div>` : ''}
        </div>
        <div class="rp-cluster-card-footer">
          <button class="rp-btn rp-btn-green rp-btn-sm" onclick="openExploreCluster('${cid}')">Explore this area</button>
          <button class="rp-btn rp-btn-sm ${isSaved ? 'rp-btn-green' : 'rp-btn-outline'}" onclick="toggleSaveCluster('${cid}')">
            ${isSaved ? '&#10003; Saved' : 'Save'}
          </button>
        </div>
      </div>`;
  }

  const compareStrip = (comparisons.length > 0 || state.surfacedClusters.length > 0) ? `
    <div class="rp-compare-strip rp-animate rp-animate-d5">
      <div class="rp-compare-strip-title">Compare two areas side by side</div>
      <div class="rp-compare-strip-sub">See how studying can feel different — there's no "better," just different paths.</div>
      ${comparisons.length ? `<div class="rp-compare-pairs">
        ${comparisons.map(comp => {
          const a = clusters.find(c => c.id === comp.a);
          const b = clusters.find(c => c.id === comp.b);
          if (!a || !b) return '';
          const both = new Set(state.surfacedClusters).has(comp.a) && new Set(state.surfacedClusters).has(comp.b);
          return `<button class="rp-compare-pair-btn" onclick="openComparison('${comp.a}','${comp.b}')">
            <div>
              <div class="rp-compare-pair-names">${a.title} <span style="color:#94a3b8">vs</span> ${b.title}</div>
              <div class="rp-compare-pair-hint">${both ? 'Both surfaced for you' : 'Common comparison'}</div>
            </div>
            <span class="rp-compare-arrow">&#8594;</span>
          </button>`;
        }).join('')}
      </div>` : ''}
      <button class="rp-btn rp-btn-outline rp-btn-full" onclick="openComparisonPicker()">Compare any two areas</button>
    </div>` : '';

  return `
    ${rpTopbar(savedCount, null)}
    <div class="rp rp-wrap">
      <div class="rp-section-header rp-animate">
        <div class="rp-eyebrow">Your Results</div>
        <div class="rp-h1">Where Your Interests <em>Often Show Up</em></div>
        <div class="rp-subtitle">These aren't recommendations — just areas students often explore based on similar preferences.</div>
      </div>

      ${state.surfacedClusters.length === 0 ? `<div class="rp-content-card"><p style="color:#64748b">No areas surfaced yet. Try completing the assessment.</p></div>` : `
        ${group1.length ? `
          <div class="rp-group-label rp-animate"><span class="rp-group-label-dot"></span>Start exploring here</div>
          <p style="font-size:12px;color:#94a3b8;margin-bottom:14px;margin-top:-8px">Strongest overlap with what you said you enjoy and how you like to work.</p>
          ${group1.map((cid, i) => clusterCard(cid, i)).join('')}
        ` : ''}
        ${group2.length ? `
          <div class="rp-group-2-label">Also worth exploring</div>
          <p style="font-size:12px;color:#94a3b8;margin-bottom:14px;margin-top:-8px">These connect to your interests too — especially if you want to explore something new.</p>
          ${group2.map((cid, i) => clusterCard(cid, i + group1.length)).join('')}
        ` : ''}
      `}
      ${compareStrip}
    </div>`;
}

function renderComparisonPicker() {
  ensureResultsStyles();
  const savedCount = state.favorites.clusters.size + state.favorites.majors.size + state.favorites.schools.size;
  const surfacedSet = new Set(state.surfacedClusters);

  const suggested = canonicalComparisons
    .map(([a,b]) => ({a,b}))
    .filter(({a,b}) => a && b)
    .sort((p1,p2) => {
      const s1 = (surfacedSet.has(p1.a)?1:0)+(surfacedSet.has(p1.b)?1:0);
      const s2 = (surfacedSet.has(p2.a)?1:0)+(surfacedSet.has(p2.b)?1:0);
      return s2-s1;
    }).slice(0,6);

  const surfacedFirst = clusters.filter(c => surfacedSet.has(c.id));
  const rest = clusters.filter(c => !surfacedSet.has(c.id));
  const ordered = [...surfacedFirst, ...rest];
  const listForPick = state.compareShowAll ? ordered : (surfacedFirst.length ? surfacedFirst : ordered);

  if (!state.compareMode || state.compareMode === 'home') {
    return `
      ${rpTopbar(savedCount, "state.screen='clusters'; render();")}
      <div class="rp rp-wrap">
        <div class="rp-section-header rp-animate">
          <div class="rp-eyebrow">Compare Areas</div>
          <div class="rp-h1">See How Two Areas <em>Feel Different</em></div>
          <div class="rp-subtitle">There's no "better" — just different ways of working and thinking.</div>
        </div>
        ${suggested.length ? `
        <div class="rp-content-card rp-animate rp-animate-d1">
          <div class="rp-content-label">Common comparisons students explore</div>
          <div class="rp-compare-pairs">
            ${suggested.map(p => {
              const a = clusters.find(c=>c.id===p.a);
              const b = clusters.find(c=>c.id===p.b);
              if (!a||!b) return '';
              const both = surfacedSet.has(p.a)&&surfacedSet.has(p.b);
              return `<button class="rp-compare-pair-btn" onclick="openComparison('${p.a}','${p.b}')">
                <div>
                  <div class="rp-compare-pair-names">${a.title} <span style="color:#94a3b8">vs</span> ${b.title}</div>
                  <div class="rp-compare-pair-hint">${both?'Both surfaced for you':'Common comparison'}</div>
                </div>
                <span class="rp-compare-arrow">&#8594;</span>
              </button>`;
            }).join('')}
          </div>
        </div>` : ''}
        <div class="rp-content-card rp-animate rp-animate-d2">
          <div class="rp-content-label">Choose your own comparison</div>
          <p style="font-size:13px;color:#94a3b8;margin-bottom:12px">You can compare any two areas.</p>
          <button class="rp-btn rp-btn-green rp-btn-full" onclick="state.compareMode='pickA'; state.compareFirst=null; state.compareShowAll=false; render();">
            Choose two areas to compare
          </button>
        </div>
      </div>`;
  }

  if (state.compareMode === 'pickA') {
    return `
      ${rpTopbar(savedCount, "state.compareMode='home'; render();")}
      <div class="rp rp-wrap">
        <div class="rp-section-header rp-animate">
          <div class="rp-eyebrow">Step 1 of 2</div>
          <div class="rp-h1">Pick the <em>First</em> Area</div>
        </div>
        <div class="rp-content-card rp-animate rp-animate-d1">
          <div class="rp-picker-cluster-list">
            ${listForPick.map(c => `
              <button class="rp-picker-item" onclick="state.compareFirst='${c.id}'; state.compareMode='pickB'; render();">
                <div>
                  <div class="rp-picker-item-title">${c.title}</div>
                  ${surfacedSet.has(c.id) ? `<div class="rp-picker-item-tag">Surfaced for you</div>` : ''}
                </div>
                <span style="color:#94a3b8">&#8594;</span>
              </button>`).join('')}
          </div>
          ${!state.compareShowAll && surfacedFirst.length < ordered.length ? `
          <button class="rp-btn rp-btn-ghost rp-btn-full" style="margin-top:10px" onclick="state.compareShowAll=true; render();">
            Show all areas
          </button>` : ''}
        </div>
      </div>`;
  }

  if (state.compareMode === 'pickB') {
    const firstCluster = clusters.find(c => c.id === state.compareFirst);
    const [accentFirst] = clusterAccent(state.compareFirst);
    return `
      ${rpTopbar(savedCount, "state.compareMode='pickA'; render();")}
      <div class="rp rp-wrap">
        <div class="rp-section-header rp-animate">
          <div class="rp-eyebrow">Step 2 of 2</div>
          <div class="rp-h1">Pick the <em>Second</em> Area</div>
          <div class="rp-subtitle">Comparing with: <strong style="color:${accentFirst}">${firstCluster.title}</strong></div>
        </div>
        <div class="rp-content-card rp-animate rp-animate-d1">
          <div class="rp-picker-cluster-list">
            ${listForPick.filter(c => c.id !== state.compareFirst).map(c => `
              <button class="rp-picker-item" onclick="openComparison('${state.compareFirst}','${c.id}')">
                <div>
                  <div class="rp-picker-item-title">${c.title}</div>
                  ${surfacedSet.has(c.id) ? `<div class="rp-picker-item-tag">Surfaced for you</div>` : ''}
                </div>
                <span style="color:#94a3b8">&#8594;</span>

          ${!state.compareShowAll && surfacedFirst.length < ordered.length ? `

        </div>
      </div>`;
  }

  return `${rpTopbar(savedCount, "state.screen='clusters'; render();")}<div class="rp rp-wrap"><p>Loading...</p></div>`;
}

function selectPass1Answer(value) {
    const domain = domains[state.p1Index];
    state.p1Answers[domain.id] = value;
    saveState();
    render();
}

function nextPass1() {
    if (state.p1Index < domains.length - 1) {
        state.p1Index++;
        saveState();
        render();
    } else {
        finishPass1();
    }
}

function prevPass1() {
    if (state.p1Index > 0) {
        state.p1Index--;
        saveState();
        render();
    }
}

function toggleDomain(domainId) {
    if (state.selectedDomains.has(domainId)) {
        state.selectedDomains.delete(domainId);
    } else {
        if (state.selectedDomains.size < 4) {
            state.selectedDomains.add(domainId);
        }
    }
    saveState();
    render();
}

function setPass2Style(domainId, style) {
    if (!state.p2Answers[domainId]) state.p2Answers[domainId] = {};
    state.p2Answers[domainId].style = style;
    saveState();
    render();
}

function togglePass2Activity(domainId, activity) {
    if (!state.p2Answers[domainId]) state.p2Answers[domainId] = {};
    if (!state.p2Answers[domainId].activities) state.p2Answers[domainId].activities = [];
    
    const idx = state.p2Answers[domainId].activities.indexOf(activity);
    if (idx > -1) {
        state.p2Answers[domainId].activities.splice(idx, 1);
    } else {
        state.p2Answers[domainId].activities.push(activity);
    }
    saveState();
    render();
}

function togglePass2Motivation(domainId, motivation) {
    // Decode HTML entity
    const decodedMotivation = motivation.replace(/&apos;/g, "'");
    
    if (!state.p2Answers[domainId]) state.p2Answers[domainId] = {};
    if (!state.p2Answers[domainId].motivations) state.p2Answers[domainId].motivations = [];
    
    const idx = state.p2Answers[domainId].motivations.indexOf(decodedMotivation);
    if (idx > -1) {
        state.p2Answers[domainId].motivations.splice(idx, 1);
    } else {
        state.p2Answers[domainId].motivations.push(decodedMotivation);
    }
    saveState();
    render();
}

function setPass2Frustration(domainId, frustration) {
    // Decode HTML entity
    const decodedFrustration = frustration.replace(/&apos;/g, "'");
    
    if (!state.p2Answers[domainId]) state.p2Answers[domainId] = {};
    state.p2Answers[domainId].frustration = decodedFrustration;
    
    saveState();

}

function setPass2Reflect(domainId, reflect) {

    state.p2Answers[domainId].reflect = reflect;
    saveState();
    render();

    }
}

function prevPass2() {

function toggleSaveCluster(clusterId) {
    if (state.favorites.clusters.has(clusterId)) {
        state.favorites.clusters.delete(clusterId);
    } else {
        const cluster = clusters.find(c => c.id === clusterId);
        state.favorites.clusters.set(clusterId, cluster);
        trackAppend('clusters_saved', clusterId);
    }
    saveFavorites();
    render();
}

function toggleSaveSchool(schoolKey, name, city, stateCode) {
    if (state.favorites.schools.has(schoolKey)) {
        state.favorites.schools.delete(schoolKey);
    } else {
        state.favorites.schools.set(schoolKey, { name, city, state: stateCode });
        trackAppend('schools_saved', name);
    }
    saveFavorites();
    
    // Re-render only the search results to preserve the list
    if (window.schoolSearchResults) {
        displaySchoolResults(window.schoolSearchResults);
    }
}

function toggleSaveMajor(majorName, clusterId) {
    const key = `${majorName}_${clusterId}`;
    if (state.favorites.majors.has(key)) {
        state.favorites.majors.delete(key);
    } else {
        state.favorites.majors.set(key, { name: majorName, clusterId });
        trackAppend('majors_saved', majorName);
    }
    saveFavorites();
    render();
}

function removeAllSaved() {
    const totalItems = state.favorites.clusters.size + state.favorites.majors.size + state.favorites.schools.size;
    
    if (totalItems === 0) {
        return; // Nothing to remove
    }
    
    // Set confirmation state
    state.confirmRemoveAll = true;
    render();
}

function confirmRemoveAllSaved() {
    state.favorites.clusters.clear();
    state.favorites.majors.clear();
    state.favorites.schools.clear();
    state.confirmRemoveAll = false;
    saveFavorites();
    render();
}

function cancelRemoveAll() {
    state.confirmRemoveAll = false;
    render();
}

// Helper functions for school search
function getSizeRangeParam(sizeBand) {
    if (sizeBand === "Small") return "1..4999";
    if (sizeBand === "Medium") return "5000..14999";
    if (sizeBand === "Large") return "15000..";
    return null;
}

function getSizeLabel(n) {
    if (typeof n !== "number") return "";
    if (n < 5000) return "Small";
    if (n < 15000) return "Medium";
    return "Large";
}

function getCampusSetting(localeCode) {
    const code = Number(localeCode);
    if ([11, 12, 13].includes(code)) return "City";
    if ([21, 22, 23].includes(code)) return "Suburban";
    if ([31, 32, 33].includes(code)) return "Town";
    if ([41, 42, 43].includes(code)) return "Rural";
    return "Not listed";
}

function filterSchoolResults() {
    if (!window.schoolSearchResults) return;
    
    const campusFilter = window.schoolCampus || 'All';
    if (campusFilter === 'All') {
        displaySchoolResults(window.schoolSearchResults);
        return;
    }
    
    const filtered = window.schoolSearchResults.filter(r => {
        const locale = r?.['school.locale'] || r?.school?.locale;
        return getCampusSetting(locale) === campusFilter;
    });
    
    displaySchoolResults(filtered);
}

function displaySchoolResults(schools) {
    const resultsDiv = document.getElementById('searchResults');
    
    if (!schools || schools.length === 0) {
        resultsDiv.innerHTML = '<p class="text-sm text-muted">No schools found</p>';
        return;
    }
    
    const cip4List = resolveCip4(state.activeMajor.name, state.activeMajor.clusterId);
    
    resultsDiv.innerHTML = `
        <div class="mb-2">
            <p class="text-sm font-semibold">${schools.length} school${schools.length !== 1 ? 's' : ''} found</p>
        </div>
        ${schools.map(school => {
            const name = school['school.name'] || school?.school?.name || 'Unknown School';
            const city = school['school.city'] || school?.school?.city || '';
            const stateCode = school['school.state'] || school?.school?.state || '';
            const url = school['school.school_url'] || school?.school?.school_url || '';
            const size = school['latest.student.size'] || school?.latest?.student?.size;
            const locale = school['school.locale'] || school?.school?.locale;
            const programs = school['latest.programs.cip_4_digit'] || school?.latest?.programs?.cip_4_digit || [];
            
            // Check for program match
            let programMatch = 'Unknown';
            if (window.useProgram !== false && cip4List && cip4List.length > 0) {
                const schoolCips = programs.map(p => String(p?.code || '').replace(/\\./g, ''));
                const hasMatch = cip4List.some(cip => schoolCips.includes(cip));
                programMatch = hasMatch ? 'Likely' : 'Not listed';
            }
            
            const schoolKey = `${name}_${city}_${stateCode}`;
            const isSaved = state.favorites.schools.has(schoolKey);
            
            return `
                <div class="school-card">
                    <div class="flex items-center justify-between mb-2">
                        <h3>${name}</h3>
                        <button class="btn btn-sm ${isSaved ? 'btn-primary' : 'btn-outline'}" onclick="toggleSaveSchool('${schoolKey.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}', '${city.replace(/'/g, "\\'")}', '${stateCode.replace(/'/g, "\\'")}')">
                            ${isSaved ? 'Saved' : 'Save'}
                        </button>
                    </div>
                    <div class="details">
                        ${city && stateCode ? '<span class="badge-secondary">' + city + ', ' + stateCode + '</span>' : ''}
                        ${size ? '<span class="badge-secondary">' + getSizeLabel(size) + ' (' + size.toLocaleString() + ' students)</span>' : ''}
                        ${locale ? '<span class="badge-secondary">' + getCampusSetting(locale) + '</span>' : ''}
                        ${window.useProgram !== false ? '<span class="badge ' + (programMatch === 'Likely' ? '' : 'badge-secondary') + '">Program: ' + programMatch + '</span>' : ''}
                    </div>
                    ${url ? '<a href="' + (url.startsWith('http') ? url : 'https://' + url) + '" target="_blank" class="text-sm" style="color: #1e293b;">Visit website</a>' : ''}
                    <a href="https://collegescorecard.ed.gov/search/?search=${encodeURIComponent(name)}" target="_blank" class="text-sm text-muted" style="display: block; margin-top: 4px;">View on College Scorecard</a>
                </div>
            `;
        }).join('')}
    `;
}

async function searchSchoolsAdvanced() {
    const mode = window.schoolSearchMode || 'zip';
    const zip = (window.schoolZip || '').trim();
    const radius = window.schoolRadius || '25';
    const stateCode = window.schoolState;
    const sizeBand = window.schoolSize || 'All';
    const useProgramFilter = window.useProgram !== false;
    
    const resultsDiv = document.getElementById('searchResults');
    
    if (mode === 'zip') {
        if (!/^[0-9]{5}$/.test(zip)) {
            resultsDiv.innerHTML = '<p class="text-sm" style="color: #b91c1c;">Please enter a valid 5-digit ZIP code</p>';
            return;
        }
    } else if (mode === 'state') {
        if (!stateCode) {
            resultsDiv.innerHTML = '<p class="text-sm" style="color: #b91c1c;">Please select a state</p>';
            return;
        }
    }
    
    resultsDiv.innerHTML = '<div class="loading">Searching schools...</div>';
    
    try {
        const params = new URLSearchParams();
        
        if (mode === 'zip') {
            params.set("zip", zip);
            params.set("distance", `${radius}mi`);
        } else if (mode === 'state') {
            params.set("school.state", stateCode);
        }
        
        params.set("per_page", "25");
        
        const sizeRange = getSizeRangeParam(sizeBand);
        if (sizeRange) {
            params.set("latest.student.size__range", sizeRange);
        }
        
        params.set("fields", [
            "id",
            "school.name",
            "school.city",
            "school.state",
            "school.school_url",
            "school.locale",
            "latest.student.size",
            "latest.programs.cip_4_digit.code",
            "latest.programs.cip_4_digit.title",
        ].join(","));
        
        // Use Supabase Edge Function to proxy College Scorecard API
        const edgeFunctionUrl = "https://clhuplhaejneecbyhphh.supabase.co/functions/v1/college-scorecard";
        const cip4List = resolveCip4(state.activeMajor.name, state.activeMajor.clusterId);
        
        // Supabase anon key for Edge Function authentication
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsaHVwbGhhZWpuZWVjYnlocGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA2Mzc5OTksImV4cCI6MjA3NjIxMzk5OX0.ropRR6Izmcy1sRV5v9HDDvBTlCTTGnJcLUvdSyYloBI";
        
        const headers = {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        };
        
        let results = [];
        
        if (useProgramFilter && cip4List && cip4List.length > 0) {
            // Multi-CIP search: run one request per CIP and merge results
            params.set("all_programs_nested", "true");
            params.set("keys_nested", "true");
            
            const promises = cip4List.map(async (cip) => {
                const p = new URLSearchParams(params);
                p.set("latest.programs.cip_4_digit.code", cip);
                const url = `${edgeFunctionUrl}?${p.toString()}`;
                const response = await fetch(url, { headers });
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                const data = await response.json();
                return data.results || [];
            });
            
            const allResults = await Promise.all(promises);
            const flat = allResults.flat();
            
            // Deduplicate by school ID
            const seen = new Set();
            results = flat.filter(r => {
                const id = r?.id;
                if (!id) return true;
                if (seen.has(id)) return false;
                seen.add(id);
                return true;
            });
        } else {
            // Simple search without program filter
            const url = `${edgeFunctionUrl}?${params.toString()}`;
            const response = await fetch(url, { headers });
            if (!response.ok) throw new Error(`API error: ${response.status}`);
            const data = await response.json();
            results = data.results || [];
        }
        
        window.schoolSearchResults = results;
        filterSchoolResults();
        
    } catch (error) {
        resultsDiv.innerHTML = `<p class="text-sm" style="color: #b91c1c;">Error: ${error.message || 'Could not fetch schools'}</p>`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
  // Height reporter — only sends when height genuinely changes, preventing loops
  let lastHeight = 0;
  function sendHeight() {
    const h = document.body.scrollHeight;
    if (h !== lastHeight) {
      lastHeight = h;
      window.parent.postMessage({ type: 'cloverpath-height', height: h }, '*');
    }
  }
  // Fire after every render screen change
  const _render = window.render;
  window.render = function() {
    _render();
    setTimeout(sendHeight, 150);
  };
  // Fire on initial load
  setTimeout(sendHeight, 500);
  setTimeout(sendHeight, 1500);
  const app = document.getElementById('app');
  app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#555;font-size:15px;">Loading...</div>';
  loadContent()
    .then(() => {
      loadState();
      loadFavorites();
      render();
    })
    .catch(err => {
      app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#c00;font-size:15px;">Failed to load content. Please refresh.</div>';
      console.error('Content load error:', err);
    });
});

    </script>
</body>
</html>
